<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    
    <title>Accès Sécurisé</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .auth-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            display: block;
        }

        input[type="password"] {
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            border-color: #007bff;
        }

        .btn-access {
            display: none; /* Caché par défaut */
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
            cursor: pointer;
        }

        .btn-access:hover {
            background-color: #0056b3;
        }

        .btn-access:active {
            transform: scale(0.98);
        }

        #hint {
            color: #888;
            font-size: 13px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="auth-box">
            <label for="pwd-field">Code d'accès requis</label>
            
            <input type="password" id="pwd-field" placeholder="Entrez le mot de passe..." autocomplete="off">
            
            <a id="btn-access" 
               href="https://creatorapp.zohopublic.eu/defibeodefibeodefibeo/defibeo-defibeo-defibeo-jpm973/form-perma/Op_ration/xCKX63qxkRUp3p0pRCJJz1SvH2UAFVkfT8A2KM7fjA2fqdOrJzNbPG8sbUQGXkH617h7SXGKFgWSFpz0SWemTvAts3zP19ddPsRD" 
               target="_blank">
                Compléter
            </a>

            <p id="hint">Le bouton apparaîtra une fois le code valide.</p>
        </div>
    </div>

    <script>
        (function() {
            var input = document.getElementById('pwd-field');
            var btn = document.getElementById('btn-access');
            var hint = document.getElementById('hint');
            var secret = "DEEX3z/-isx";

            if (input) {
                input.addEventListener('input', function() {
                    // .trim() retire les espaces accidentels avant ou après
                    if (this.value.trim() === secret) {
                        btn.style.display = "block";
                        hint.style.display = "none";
                    } else {
                        btn.style.display = "none";
                        hint.style.display = "block";
                    }
                });

                // Empêcher la soumission d'un formulaire fantôme sur "Entrée"
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && btn.style.display === "block") {
                        btn.click();
                    }
                });
            }
        })();
    </script>

</body>
</html>
