<script>

/* REAL MOBILE HEIGHT */

function setRealViewportHeight() {

    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);

}

setRealViewportHeight();

window.addEventListener('resize', setRealViewportHeight);
window.addEventListener('orientationchange', setRealViewportHeight);

/* PIN INPUTS */

const pinBoxes = document.querySelectorAll('.pin-box');

pinBoxes.forEach((input, index) => {

    input.addEventListener('input', () => {

        if(input.value.length === 1 && index < pinBoxes.length - 1){
            pinBoxes[index + 1].focus();
        }

    });

    input.addEventListener('keydown', (e) => {

        if(e.key === 'Backspace' && input.value === '' && index > 0){
            pinBoxes[index - 1].focus();
        }

    });

});

/* LOGIN */

document.getElementById('loginBtn').addEventListener('click', checkPin);

function checkPin(){

    let pin = '';

    pinBoxes.forEach(input => {
        pin += input.value;
    });

    if(pin === '9737'){

        document.getElementById('loginText').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

        }, 3000);

    }else{

        document.getElementById('errorText').style.display = 'block';

    }

}

/* IFRAME NAVIGATION */

const navButtons = document.querySelectorAll('.nav-btn');
const iframe = document.getElementById('mainFrame');

navButtons.forEach(button => {

    button.addEventListener('click', function(){

        navButtons.forEach(btn => {
            btn.classList.remove('active');
        });

        this.classList.add('active');

        iframe.src = this.getAttribute('data-iframe');

    });

});

</script>
