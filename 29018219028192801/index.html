<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">

<title>Accès Technicien</title>

<style>

@font-face {
    font-family: 'DefibeoMain';
    font-weight: 100 !important;
    src: url('https://datacenter64000pau.s3.eu-north-1.amazonaws.com/defibeoMAIN.otf') format('opentype');
}

*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
    font-family:'DefibeoMain', Arial, sans-serif;
}

/* LOGIN */

.login-screen{
    position:fixed;
    inset:0;
    background:#fff;
    z-index:99999;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:25px;
}

.login-box{
    width:100%;
    max-width:390px;
    text-align:center;
}

.brand-block{
    margin-bottom:30px;
}

.brand-title{
    font-size:42px;
    line-height:1;
    color:#111827;
    margin-bottom:8px;
}

.brand-subtitle{
    font-size:16px;
    color:#6b7280;
}

.login-text{
    font-size:18px;
    line-height:1.4;
    color:#111827;
    margin-bottom:22px;
}

/* PIN BOXES */

.pin-wrapper{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:18px;
}

.pin-box{
    width:62px;
    height:62px;
    border-radius:18px;
    border:1px solid #dbe3ee;
    text-align:center;
    font-size:28px;
    font-family:'DefibeoMain', Arial, sans-serif;
    outline:none;
    transition:0.2s;
}

.pin-box:focus{
    border-color:#674eff;
    box-shadow:0 0 0 4px rgba(103,78,255,0.08);
}

/* LOGIN BUTTON */

.login-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:#674eff;
    color:#fff;
    font-size:18px;
    font-family:'DefibeoMain', Arial, sans-serif;
    cursor:pointer;
    position:relative;

    box-shadow:
    inset 0 1px 1px #fff3,
    0 1px 2px #08080833,
    0 4px 4px #08080814,
    0 7px 0 -12px #077ac7,
    inset 0 6px 12px #ffffff1f;
}

.loader{
    width:22px;
    height:22px;
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid #fff;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:auto;
    display:none;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.error-text{
    color:#ff3b30;
    margin-top:14px;
    font-size:14px;
    display:none;
}

/* APP */

#app{
    display:none;
    width:100%;
    height:100%;
}

/* TOPBAR */

.topbar{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    background:linear-gradient(45deg,#674eff,#523cd9);
    padding:10px 15px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
}

.topbar::-webkit-scrollbar{
    display:none;
}

.topbar-inner{
    display:inline-flex;
    align-items:center;
    gap:12px;
    min-width:max-content;
}

/* BRAND */

.nav-brand{
    margin-right:18px;
    flex-shrink:0;
}

.nav-brand-title{
    font-size:26px;
    line-height:1;
    color:#fff;
    margin-bottom:2px;
}

.nav-brand-subtitle{
    font-size:12px;
    color:#ffffff90;
}

/* NAV BUTTONS */

.nav-btn{
    border:none;
    outline:none;
    background:#674eff;
    color:#fff;
    padding:13px 20px;
    border-radius:15px;
    font-size:16px;
    font-family:'DefibeoMain', Arial, sans-serif;
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;

    box-shadow:
    inset 0 1px 1px #fff3,
    0 1px 2px #08080833,
    0 4px 4px #08080800,
    0 7px 0 -12px #6148f2,
    inset 0 6px 12px #ffffff1f;
}

.nav-btn.active{
    background:#000 !important;
}

/* IFRAME */

.iframe-wrapper{
    width:100vw;
    height:calc(100vh - 82px);
    overflow:hidden;
}

iframe{
    width:100vw !important;
    min-width:100vw !important;
    max-width:100vw !important;
    height:100% !important;
    border:none;
    display:block;
    background:#fff;
}

/* MOBILE */

@media(max-width:768px){

    .brand-title{
        font-size:36px;
    }

    .pin-box{
        width:58px;
        height:58px;
        font-size:24px;
    }

    .nav-brand-title{
        font-size:22px;
    }

    .nav-btn{
        padding:12px 16px;
        font-size:13px;
    }

    .iframe-wrapper{
        height:calc(100vh - 84px);
    }

}

</style>
</head>
<body>

<!-- LOGIN -->

<div class="login-screen" id="loginScreen">

    <div class="login-box">

        <div class="brand-block">

            <div class="brand-title">
                DemoTest
            </div>

            <div class="brand-subtitle">
                Accès Technicien
            </div>

        </div>

        <div class="login-text">
            Entrez votre PIN utilisateur pour accéder à votre compte technicien.
        </div>

        <!-- PIN -->
        <div class="pin-wrapper">

            <input type="password" maxlength="1" class="pin-box">
            <input type="password" maxlength="1" class="pin-box">
            <input type="password" maxlength="1" class="pin-box">
            <input type="password" maxlength="1" class="pin-box">

        </div>

        <!-- BUTTON -->
        <button class="login-btn" id="loginBtn">

            <span id="loginText">
                Connexion
            </span>

            <div class="loader" id="loader"></div>

        </button>

        <div class="error-text" id="errorText">
            PIN incorrect
        </div>

    </div>

</div>

<!-- APP -->

<div id="app">

    <div class="topbar">

        <div class="topbar-inner">

            <div class="nav-brand">

                <div class="nav-brand-title">
                    DemoTest
                </div>

                <div class="nav-brand-subtitle">
                    Accès Technicien
                </div>

            </div>

            <button 
                class="nav-btn active"
                data-iframe="https://creatorapp.zohopublic.eu/temp_civilprom/demoavril/form-embed/Op_ration/EFW4Xmqkfkwtr1aVkOkJXaPe8EBPOCh35k0sWb1MDjHM4P64bgaU747pPSqRPS05U5PhdfsWB9gDbyDdqCsCxPjw3Jue5YQePFpw">
                Interventions
            </button>

            <button 
                class="nav-btn"
                data-iframe="https://example.com">
                Reçus
            </button>

            <button 
                class="nav-btn"
                data-iframe="https://example.com">
                Reçu Spontanné
            </button>

            <button 
                class="nav-btn"
                data-iframe="https://example.com">
                Ticket Caisse
            </button>

            <button 
                class="nav-btn"
                data-iframe="https://example.com">
                Partager Position GPS
            </button>

            <button 
                class="nav-btn"
                data-iframe="https://demotest.defibeo.com/">
                Accès Logiciel
            </button>

        </div>

    </div>

    <div class="iframe-wrapper">

        <iframe
            id="mainFrame"
            frameborder="0"
            allowTransparency="true"
            scrolling="auto"
            src="https://creatorapp.zohopublic.eu/temp_civilprom/demoavril/form-embed/Op_ration/EFW4Xmqkfkwtr1aVkOkJXaPe8EBPOCh35k0sWb1MDjHM4P64bgaU747pPSqRPS05U5PhdfsWB9gDbyDdqCsCxPjw3Jue5YQePFpw">
        </iframe>

    </div>

</div>

<script>

/* PIN INPUTS */

const pinBoxes = document.querySelectorAll('.pin-box');

pinBoxes.forEach((input, index) => {

    input.addEventListener('input', () => {

        if(input.value.length === 1 && index < pinBoxes.length - 1){
            pinBoxes[index + 1].focus();
        }

    });

    input.addEventListener('keydown', (e) => {

        if(e.key === 'Backspace' && input.value === '' && index > 0){
            pinBoxes[index - 1].focus();
        }

    });

});

/* LOGIN */

document.getElementById('loginBtn').addEventListener('click', checkPin);

function checkPin(){

    let pin = '';

    pinBoxes.forEach(input => {
        pin += input.value;
    });

    if(pin === '9737'){

        document.getElementById('loginText').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        setTimeout(() => {

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';

        }, 3000);

    }else{

        document.getElementById('errorText').style.display = 'block';

    }

}

/* IFRAME NAVIGATION */

const navButtons = document.querySelectorAll('.nav-btn');
const iframe = document.getElementById('mainFrame');

navButtons.forEach(button => {

    button.addEventListener('click', function(){

        navButtons.forEach(btn => {
            btn.classList.remove('active');
        });

        this.classList.add('active');

        iframe.src = this.getAttribute('data-iframe');

    });

});

</script>

</body>
</html>
