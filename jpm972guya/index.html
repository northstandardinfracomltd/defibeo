<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    
    <title>Vérification d'accès</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #2d3436;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus {
            border-color: #007bff;
        }

        /* Design du bouton "Compléter" */
        .btn-complete {
            display: none; /* Masqué par défaut */
            text-decoration: none;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-complete:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
            filter: brightness(1.1);
        }

        .btn-complete:active {
            transform: translateY(0);
        }

        #status-text {
            font-size: 13px;
            color: #b2bec3;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Accès au formulaire</h2>
        
        <div class="input-group">
            <input type="password" id="access-code" placeholder="Entrez votre code..." autocomplete="off">
        </div>
        
        <a id="submit-link" href="https://creatorapp.zohopublic.eu/defibeodefibeodefibeo/defibeo-defibeo-defibeo-jpm973/form-perma/Op_ration/xCKX63qxkRUp3p0pRCJJz1SvH2UAFVkfT8A2KM7fjA2fqdOrJzNbPG8sbUQGXkH617h7SXGKFgWSFpz0SWemTvAts3zP19ddPsRD">
            <button class="btn-complete" id="trigger-btn">Compléter</button>
        </a>

        <p id="status-text">Je suis technicien : veuillez saisir le code d'accès pour continuer.</p>
    </div>

    <script>
        (function() {
            var field = document.getElementById('access-code');
            var btn = document.getElementById('trigger-btn');
            var status = document.getElementById('status-text');
            var secretCode = "DEEX3z/-isx";

            field.addEventListener('input', function() {
                if (this.value.trim() === secretCode) {
                    btn.style.display = "block";
                    status.style.opacity = "0"; // Cache le texte d'instruction discrètement
                } else {
                    btn.style.display = "none";
                    status.style.opacity = "1";
                }
            });

            // Permet de valider avec la touche Entrée
            field.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && btn.style.display === "block") {
                    window.location.href = document.getElementById('submit-link').href;
                }
            });
        })();
    </script>

</body>
</html>
