<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">
    
    <title>Accès Privé | JPM 973</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #2d3436;
        }

        .auth-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #333;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: center;
        }

        input[type="password"]:focus {
            border-color: #007bff;
            background-color: #fff;
        }

        /* Design du bouton Compléter */
        .btn-submit {
            display: none; /* Masqué tant que le pass n'est pas bon */
            text-decoration: none;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
            display: none; 
            justify-content: center;
            align-items: center;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
            filter: brightness(1.1);
        }

        #hint-text {
            font-size: 13px;
            color: #b2bec3;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Accès JPM 973</h2>
        
        <div class="input-group">
            <input type="password" id="pass-field" placeholder="Entrez le code d'accès..." autocomplete="off">
        </div>
        
        <a id="redirect-link" href="https://creatorapp.zohopublic.eu/defibeodefibeodefibeo/defibeo-defibeo-defibeo-jpm973/page-perma/JPM_973/XZEyjfTNXCpCJyDB67YwX74MdSbMUZstpBd4GhZ0KBMhkxsGEQqXO6g0XWu7qbOZGyDEFwJQR1Ad8TSr0ZhtwXppBVZYApk7BGDt" style="text-decoration: none;">
            <div class="btn-submit" id="submit-btn">Compléter</div>
        </a>

        <p id="hint-text">Veuillez saisir le code pour accéder à la page.</p>
    </div>

    <script>
        (function() {
            var input = document.getElementById('pass-field');
            var btn = document.getElementById('submit-btn');
            var status = document.getElementById('hint-text');
            var secret = "DEEX3z/-isx";

            input.addEventListener('input', function() {
                if (this.value.trim() === secret) {
                    btn.style.display = "flex";
                    status.style.visibility = "hidden";
                } else {
                    btn.style.display = "none";
                    status.style.visibility = "visible";
                }
            });

            // Support de la touche Entrée
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && btn.style.display === "flex") {
                    window.location.href = document.getElementById('redirect-link').href;
                }
            });
        })();
    </script>

</body>
</html>
