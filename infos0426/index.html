<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">

    <title>Visualiseur PDF</title>

    <style>
        /* Supprime les marges et défilements par défaut du navigateur */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Empêche le scroll sur la page parente */
            background-color: #333; /* Couleur de fond neutre pendant le chargement */
        }

        /* Conteneur pour forcer le plein écran */
        .pdf-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* L'élément embed ou iframe */
        object, embed, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <object 
            data="https://civilprom.s3.eu-north-1.amazonaws.com/DEFIBEO+INFOGRAPHIE+VERSION+2026+AXL.pdf" 
            type="application/pdf">
            
            <iframe 
                src="https://civilprom.s3.eu-north-1.amazonaws.com/DEFIBEO+INFOGRAPHIE+VERSION+2026+AXL.pdf" 
                frameborder="0">
                Ce navigateur ne supporte pas l'affichage direct de PDF. 
                <a href="https://civilprom.s3.eu-north-1.amazonaws.com/DEFIBEO+INFOGRAPHIE+VERSION+2026+AXL.pdf">Cliquez ici pour télécharger le fichier.</a>
            </iframe>
        </object>
    </div>

</body>
</html>
